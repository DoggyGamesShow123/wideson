<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Knuckles 32X ROMHack</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
    }
    canvas {
      image-rendering: pixelated;
      margin-top: 20px;
    }
  </style>

  <!-- Load emulator + audio -->
  <script src="audioemu.js"></script>
  <script src="jsgenesis.min.js"></script>
</head>

<body>
  <h2>Knuckles Chaotix 32X ROMHack</h2>
  <canvas id="screen" width="320" height="224"></canvas>

  <script>
    async function loadRom() {
      const res = await fetch("knuckles.32x");
      const buf = await res.arrayBuffer();
      return new Uint8Array(buf);
    }

    async function start() {
      const rom = await loadRom();

      const emulator = new JSGenesis({
        romData: rom,
        canvas: document.getElementById("screen"),
        audio: new AudioEmuJS()
      });

      emulator.run();
    }

    start();
  </script>
</body>
</html>
