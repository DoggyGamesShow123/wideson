<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wideson — Genesis Plus GX Wide (Web)</title>
  <style>
    html,body{height:100%;margin:0;background:#0b0d12;color:#e6e6e6;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif}
    #wrap{position:fixed;inset:0;display:flex;flex-direction:column}
    header,footer{padding:.6rem 1rem}
    header{display:flex;gap:.75rem;align-items:center;font-weight:600}
    #game-container{flex:1;display:flex;align-items:center;justify-content:center}
    #game{width:100%;height:100%;max-height:100vh}
    button{background:#1f6feb;color:white;border:none;border-radius:10px;
      padding:.5rem .75rem;cursor:pointer}
    button:hover{filter:brightness(1.05)}
    footer{opacity:.8;font-size:.9rem}
  </style>
</head>
<body>
  <div id="wrap">
    <header>
      <span>Wideson — Genesis Plus GX Wide</span>
      <button onclick="EJS_fullscreen()">Fullscreen</button>
      <button onclick="EJS_pause()">Pause</button>
      <button onclick="EJS_resume()">Resume</button>
    </header>

    <div id="game-container"><div id="game"></div></div>

    <footer>Tip: You can plug in a gamepad; most modern browsers map it automatically.</footer>
  </div>

  <script>
    // --- EmulatorJS configuration ---
    window.EJS_player = '#game';
    // Use the widescreen core
    window.EJS_core = 'genesis_plus_gx_wide';
    // Load your Sonic 2 widescreen fan game from GitHub via jsDelivr
    window.EJS_gameUrl =
      'https://cdn.jsdelivr.net/gh/DoggyGamesShow123/wideson@main/s2.wide.gen';
    // Optional QoL
    window.EJS_startOnLoaded = true;  // auto-start when ready
  </script>
  <!-- CDN loader for EmulatorJS -->
  https://www.emulatorjs.com/loader.js</script>
</body>
</html>
